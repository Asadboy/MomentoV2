name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      # Tests use MockMomentoAPI and never reach SupabaseManager.shared, so
      # the secrets don't need to be real. They just have to (a) exist, so
      # the project's baseConfigurationReference to Secrets.xcconfig
      # resolves, and (b) not contain the string "YOUR_" so SupabaseConfig
      # doesn't fatalError if anyone *did* access it.
      - name: Create stub Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << 'EOF'
          SUPABASE_URL = https:/$()/ci-stub.supabase.invalid
          SUPABASE_ANON_KEY = ci-stub-key-not-real
          POSTHOG_API_KEY = ci-stub-posthog
          POSTHOG_HOST = https:/$()/eu.i.posthog.com
          SENTRY_DSN = YOUR_SENTRY_DSN
          EOF
          echo "Stub Secrets.xcconfig written."

      # Cache DerivedData — the build output cache. This is the big speed win:
      # without it every PR rebuilds Supabase / PostHog / swift-crypto from
      # source (~10 min). With it, incremental builds finish in ~2 min.
      # Key invalidates on package or project changes.
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: derived-data
          key: ${{ runner.os }}-dd-${{ hashFiles('Package.resolved', 'Momento.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-dd-

      - name: Cache Swift Package Manager checkouts
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Pre-installed simulators on macos-15 runners rotate without notice
      # (the previous workflow hardcoded "iPhone 17" and broke when a runner
      # image came up without it pre-instantiated). We discover or create an
      # iPhone simulator on the latest available iOS runtime and use its
      # UUID — robust to whatever GitHub ships.
      - name: Select / create iOS simulator
        id: pick-sim
        run: |
          set -e
          # Look for any pre-existing iPhone simulator on an iOS runtime.
          EXISTING=$(xcrun simctl list devices available -j \
            | jq -r '[.devices | to_entries[] | select(.key | startswith("com.apple.CoreSimulator.SimRuntime.iOS")) | .value[] | select(.name | startswith("iPhone"))][0].udid')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Using existing simulator: $EXISTING"
            echo "device_id=$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # None pre-installed — create one. Pick the highest iOS runtime
          # available and a sensible iPhone device type.
          RUNTIME=$(xcrun simctl list runtimes available -j \
            | jq -r '[.runtimes[] | select(.platform=="iOS" and .isAvailable==true)] | sort_by(.version) | last | .identifier')
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j \
            | jq -r '[.devicetypes[] | select(.identifier | contains("iPhone"))] | sort_by(.identifier) | last | .identifier')
          echo "Creating simulator: $DEVICE_TYPE on $RUNTIME"
          DEVICE_ID=$(xcrun simctl create "ci-sim" "$DEVICE_TYPE" "$RUNTIME")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          # Scope to the MomentoTests target so the MomentoUITests target
          # doesn't load (those time out on CI runners — AX init fails).
          # The empty MomentoTests scaffold class has nothing to run, so
          # scoping to the whole target picks up all real test classes.
          xcodebuild \
            -project Momento.xcodeproj \
            -scheme Momento \
            -destination "id=${{ steps.pick-sim.outputs.device_id }}" \
            -configuration Debug \
            -derivedDataPath derived-data \
            -resultBundlePath TestResults.xcresult \
            -only-testing:MomentoTests \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xcresult
          path: TestResults.xcresult
          retention-days: 7
