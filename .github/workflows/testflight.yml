name: Deploy to TestFlight

on:
  # PAUSED until App Store launch (2026-05).
  # The auto-on-push trigger was disabled so every merge to `main` does not
  # ship a new TestFlight build and email the internal beta testers. The
  # workflow can still be run on-demand from the Actions tab via
  # workflow_dispatch (use this to cut the final launch build).
  # TO RESUME after launch: un-comment the push block below.
  #
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: bundle install

      # Write Secrets.xcconfig from GitHub Secrets rather than overwriting
      # SupabaseConfig.swift. Closes review H46:
      #   - The previous version hardcoded the Supabase anon key inline
      #     in this YAML (leaked-in-history-class risk).
      #   - It only wrote SupabaseConfig.swift; PostHog + Sentry were
      #     never plumbed, so TestFlight builds shipped with empty
      #     analytics and zero crash visibility.
      # The build reads these via Info.plist substitution exactly the
      # same way the tests workflow and local dev do.
      - name: Write Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << EOF
          SUPABASE_URL = ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY }}
          POSTHOG_API_KEY = ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST = ${{ secrets.POSTHOG_HOST }}
          SENTRY_DSN = ${{ secrets.SENTRY_DSN }}
          EOF
          # Sanity check (won't print values) — fail fast if a required
          # secret is missing rather than shipping an empty config to TF.
          test -s Secrets.xcconfig || (echo "Secrets.xcconfig is empty"; exit 1)
          grep -q "^SUPABASE_URL = " Secrets.xcconfig || (echo "SUPABASE_URL missing"; exit 1)
          grep -q "^SUPABASE_ANON_KEY = " Secrets.xcconfig || (echo "SUPABASE_ANON_KEY missing"; exit 1)

      - name: Set up App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Import code signing certificates
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Extract UUID from provisioning profile and copy with correct name
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
        run: bundle exec fastlane beta

      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision || true
